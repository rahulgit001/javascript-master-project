<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechBazaar — Login</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">Tech<span>Bazaar</span></a>
      <ul class="navbar-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
      <div class="navbar-actions">
        <button class="navbar-icon-btn" id="cartIconBtn" aria-label="Cart">
          🛒
          <span class="badge" id="cartCount">0</span>
        </button>
        <button class="navbar-toggle" id="navToggle" aria-label="Menu">☰</button>
      </div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tabLoginBtn">Login</button>
        <button class="auth-tab" data-tab="register" id="tabRegisterBtn">Register</button>
      </div>

      <!-- ============ LOGIN FORM ============ -->
      <form class="auth-form active" id="loginForm" novalidate>
        <div class="form-group" id="loginEmailGroup">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="you@example.com">
          <span class="error-text" id="loginEmailError"></span>
        </div>

        <div class="form-group" id="loginPasswordGroup">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••">
          <span class="error-text" id="loginPasswordError"></span>
        </div>

        <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Sign in</button>
        <p class="auth-divider">Use any email + password (min 6 chars) — validation only, no real backend</p>
      </form>

      <!-- ============ REGISTER FORM ============ -->
      <form class="auth-form" id="registerForm" novalidate>
        <div class="form-group" id="regNameGroup">
          <label for="regName">Full name</label>
          <input type="text" id="regName" name="name" placeholder="Aman Sharma">
          <span class="error-text" id="regNameError"></span>
        </div>

        <div class="form-group" id="regEmailGroup">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" name="email" placeholder="you@example.com">
          <span class="error-text" id="regEmailError"></span>
        </div>

        <div class="form-group" id="regPasswordGroup">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" name="password" placeholder="Min 6 characters">
          <span class="error-text" id="regPasswordError"></span>
        </div>

        <div class="form-group" id="regConfirmGroup">
          <label for="regConfirm">Confirm password</label>
          <input type="password" id="regConfirm" name="confirm" placeholder="Re-enter password">
          <span class="error-text" id="regConfirmError"></span>
        </div>

        <button type="submit" class="btn btn-primary" id="registerSubmitBtn">Create account</button>
      </form>

    </div>
  </div>

  <div id="toast-container"></div>

  <footer>
    <div class="container">
      <p>TechBazaar Learning Project · Built to learn JavaScript step by step</p>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
